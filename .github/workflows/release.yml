name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest # Apple Silicon (aarch64) runner
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Safety gate: never ship a release built on a failing tree.
      - name: test
        run: cargo test

      - name: build release binary
        run: cargo build --release

      - name: package tarball
        run: |
          tar -czf wl-aarch64-apple-darwin.tar.gz -C target/release wl
          shasum -a 256 wl-aarch64-apple-darwin.tar.gz > wl-aarch64-apple-darwin.tar.gz.sha256
          cat wl-aarch64-apple-darwin.tar.gz.sha256

      - name: print sha256 to job summary
        run: |
          {
            echo "### wl release artifacts"
            echo ""
            echo '```'
            cat wl-aarch64-apple-darwin.tar.gz.sha256
            echo '```'
            echo ""
            echo "Copy the sha256 above (first field) into \`Formula/wl.rb\` \`sha256 \"...\"\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wl-aarch64-apple-darwin.tar.gz
            wl-aarch64-apple-darwin.tar.gz.sha256
          generate_release_notes: true
